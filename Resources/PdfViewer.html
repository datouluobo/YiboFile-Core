<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            flex-wrap: wrap;
            gap: 10px;
            transition: transform 0.3s ease;
        }

        #toolbar.hidden {
            transform: translateY(-100%);
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .toolbar-btn:active {
            transform: translateY(0);
        }

        .toolbar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toolbar-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #333;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 60px;
            text-align: center;
        }

        .toolbar-select {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #333;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .toolbar-text {
            color: white;
            font-size: 14px;
            margin: 0 8px;
        }

        #viewer-container {
            flex: 1;
            background: #525659;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
        }

        #pdf-canvas {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            background: white;
            transition: transform 0.3s ease;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }

        #loading .spinner {
            font-size: 48px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(211, 47, 47, 0.9);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            display: none;
        }

        #error h2 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        #error p {
            line-height: 1.6;
        }

        /* 全屏样式 */
        body.fullscreen {
            background: #2b2b2b;
        }

        body.fullscreen #toolbar {
            transform: translateY(-100%);
        }

        body.fullscreen #viewer-container {
            padding: 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #toolbar {
                padding: 8px 12px;
            }

            .toolbar-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .toolbar-input,
            .toolbar-select {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <div class="toolbar-group">
            <button class="toolbar-btn" id="first-page" title="首页">⏮️ 首页</button>
            <button class="toolbar-btn" id="prev-page" title="上一页">◀️ 上一页</button>
            <input type="number" id="page-num" class="toolbar-input" min="1" value="1">
            <span class="toolbar-text">/ <span id="page-count">0</span></span>
            <button class="toolbar-btn" id="next-page" title="下一页">下一页 ▶️</button>
            <button class="toolbar-btn" id="last-page" title="尾页">尾页 ⏭️</button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" id="zoom-out" title="缩小">🔍➖</button>
            <select id="zoom-select" class="toolbar-select">
                <option value="auto">适合页面</option>
                <option value="page-width">适合宽度</option>
                <option value="50">50%</option>
                <option value="75">75%</option>
                <option value="100" selected>100%</option>
                <option value="125">125%</option>
                <option value="150">150%</option>
                <option value="200">200%</option>
            </select>
            <button class="toolbar-btn" id="zoom-in" title="放大">🔍➕</button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" id="rotate" title="旋转">🔄 旋转</button>
            <button class="toolbar-btn" id="fullscreen" title="全屏">⛶ 全屏</button>
        </div>
    </div>

    <div id="viewer-container">
        <div id="loading">
            <div class="spinner">⏳</div>
            <p style="margin-top: 20px; font-size: 18px;">正在加载PDF...</p>
        </div>
        <div id="error">
            <h2>❌ 加载失败</h2>
            <p id="error-message"></p>
        </div>
        <canvas id="pdf-canvas"></canvas>
    </div>

    <!-- PDF.js 库 (本地加载 - 离线可用) -->
    <script src="pdfjs/pdf.min.js"></script>

    <script>
        // 配置PDF.js worker (本地文件)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdfjs/pdf.worker.min.js';

        // PDF状态
        let pdfDoc = null;
        let currentPage = 1;
        let currentScale = 1.0;
        let currentRotation = 0;
        let isRendering = false;

        // DOM元素
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');
        const toolbar = document.getElementById('toolbar');

        // 工具栏元素
        const firstPageBtn = document.getElementById('first-page');
        const prevPageBtn = document.getElementById('prev-page');
        const nextPageBtn = document.getElementById('next-page');
        const lastPageBtn = document.getElementById('last-page');
        const pageNumInput = document.getElementById('page-num');
        const pageCountSpan = document.getElementById('page-count');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const zoomSelect = document.getElementById('zoom-select');
        const rotateBtn = document.getElementById('rotate');
        const fullscreenBtn = document.getElementById('fullscreen');

        /**
         * 显示错误信息
         */
        function showError(message) {
            loading.style.display = 'none';
            errorMessage.textContent = message;
            errorDiv.style.display = 'block';
        }

        /**
         * 隐藏加载指示器
         */
        function hideLoading() {
            loading.style.display = 'none';
        }

        /**
         * 渲染指定页面
         */
        function renderPage(pageNum) {
            if (isRendering || !pdfDoc) return;

            isRendering = true;

            pdfDoc.getPage(pageNum).then(page => {
                // 计算缩放比例
                let scale = currentScale;
                const viewport = page.getViewport({ scale: 1, rotation: currentRotation });

                if (zoomSelect.value === 'auto') {
                    // 适合页面
                    const container = document.getElementById('viewer-container');
                    const containerWidth = container.clientWidth - 40;
                    const containerHeight = container.clientHeight - 40;
                    const scaleX = containerWidth / viewport.width;
                    const scaleY = containerHeight / viewport.height;
                    scale = Math.min(scaleX, scaleY);
                } else if (zoomSelect.value === 'page-width') {
                    // 适合宽度
                    const container = document.getElementById('viewer-container');
                    const containerWidth = container.clientWidth - 40;
                    scale = containerWidth / viewport.width;
                }

                currentScale = scale;
                const scaledViewport = page.getViewport({ scale: scale, rotation: currentRotation });

                // 设置canvas尺寸
                canvas.height = scaledViewport.height;
                canvas.width = scaledViewport.width;

                // 渲染PDF页面
                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };

                const renderTask = page.render(renderContext);
                renderTask.promise.then(() => {
                    isRendering = false;
                    hideLoading();
                }).catch(err => {
                    isRendering = false;
                    console.error('渲染错误:', err);
                });
            }).catch(err => {
                isRendering = false;
                showError('页面渲染失败: ' + err.message);
            });

            // 更新UI状态
            updateUIState();
        }

        /**
         * 更新UI状态
         */
        function updateUIState() {
            pageNumInput.value = currentPage;

            // 更新导航按钮状态
            firstPageBtn.disabled = currentPage <= 1;
            prevPageBtn.disabled = currentPage <= 1;
            nextPageBtn.disabled = currentPage >= pdfDoc.numPages;
            lastPageBtn.disabled = currentPage >= pdfDoc.numPages;
        }

        /**
         * 加载PDF文件
         */
        function loadPDF(url) {
            loading.style.display = 'block';
            errorDiv.style.display = 'none';

            const loadingTask = pdfjsLib.getDocument(url);

            loadingTask.promise.then(pdf => {
                pdfDoc = pdf;
                pageCountSpan.textContent = pdf.numPages;
                pageNumInput.max = pdf.numPages;

                // 渲染第一页
                renderPage(currentPage);
            }).catch(err => {
                showError('PDF加载失败: ' + err.message);
                console.error('加载错误:', err);
            });
        }

        // ==================== 事件处理 ====================

        // 页面导航
        firstPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage = 1;
                renderPage(currentPage);
            }
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        });

        nextPageBtn.addEventListener('click', () => {
            if (currentPage < pdfDoc.numPages) {
                currentPage++;
                renderPage(currentPage);
            }
        });

        lastPageBtn.addEventListener('click', () => {
            if (currentPage < pdfDoc.numPages) {
                currentPage = pdfDoc.numPages;
                renderPage(currentPage);
            }
        });

        pageNumInput.addEventListener('change', () => {
            let page = parseInt(pageNumInput.value);
            if (page >= 1 && page <= pdfDoc.numPages) {
                currentPage = page;
                renderPage(currentPage);
            } else {
                pageNumInput.value = currentPage;
            }
        });

        // 缩放控制
        zoomInBtn.addEventListener('click', () => {
            const currentValue = parseInt(zoomSelect.value) || 100;
            const newValue = Math.min(currentValue + 25, 200);
            zoomSelect.value = newValue.toString();
            currentScale = newValue / 100;
            renderPage(currentPage);
        });

        zoomOutBtn.addEventListener('click', () => {
            const currentValue = parseInt(zoomSelect.value) || 100;
            const newValue = Math.max(currentValue - 25, 50);
            zoomSelect.value = newValue.toString();
            currentScale = newValue / 100;
            renderPage(currentPage);
        });

        zoomSelect.addEventListener('change', () => {
            const value = zoomSelect.value;
            if (value === 'auto' || value === 'page-width') {
                renderPage(currentPage);
            } else {
                currentScale = parseInt(value) / 100;
                renderPage(currentPage);
            }
        });

        // 旋转
        rotateBtn.addEventListener('click', () => {
            currentRotation = (currentRotation + 90) % 360;
            renderPage(currentPage);
        });

        // 全屏
        fullscreenBtn.addEventListener('click', () => {
            if (document.body.classList.contains('fullscreen')) {
                document.body.classList.remove('fullscreen');
                fullscreenBtn.textContent = '⛶ 全屏';
            } else {
                document.body.classList.add('fullscreen');
                fullscreenBtn.textContent = '⛶ 退出全屏';
            }
        });

        // ESC退出全屏
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.classList.contains('fullscreen')) {
                document.body.classList.remove('fullscreen');
                fullscreenBtn.textContent = '⛶ 全屏';
            }
        });

        // 鼠标滚轮缩放 (Ctrl + 滚轮)
        document.getElementById('viewer-container').addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -25 : 25;
                const currentValue = parseInt(zoomSelect.value) || 100;
                const newValue = Math.max(50, Math.min(200, currentValue + delta));
                zoomSelect.value = newValue.toString();
                currentScale = newValue / 100;
                renderPage(currentPage);
            }
        });

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // 忽略输入框中的按键

            switch (e.key) {
                case 'ArrowLeft':
                case 'PageUp':
                    prevPageBtn.click();
                    break;
                case 'ArrowRight':
                case 'PageDown':
                    nextPageBtn.click();
                    break;
                case 'Home':
                    firstPageBtn.click();
                    break;
                case 'End':
                    lastPageBtn.click();
                    break;
            }
        });

        // ==================== C# 桥接 ====================

        /**
         * 从C#调用此函数以加载PDF
         * @param {string} pdfPath - PDF文件路径
         */
        window.loadPdfFromPath = function (pdfPath) {
            loadPDF(pdfPath);
        };

        /**
         * 获取当前状态信息(供C#调用)
         */
        window.getPdfState = function () {
            return {
                currentPage: currentPage,
                totalPages: pdfDoc ? pdfDoc.numPages : 0,
                scale: currentScale,
                rotation: currentRotation
            };
        };

        // 窗口大小改变时重新渲染
        window.addEventListener('resize', () => {
            if (pdfDoc && (zoomSelect.value === 'auto' || zoomSelect.value === 'page-width')) {
                renderPage(currentPage);
            }
        });
    </script>
</body>

</html>
